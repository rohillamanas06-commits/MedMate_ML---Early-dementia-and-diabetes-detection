services:
  - type: web
    name: medmate-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn MedMate_ml:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: FLASK_ENV
        value: production
      - key: FLASK_PORT
        value: 10000
      - key: CORS_ORIGINS
        value: https://your-frontend-domain.vercel.app
    healthCheckPath: /health
